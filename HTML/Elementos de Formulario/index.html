<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Formulário</title>
</head>
<body>
    <h1>Elementos de Formulário</h1>
    <p>Os elementos de formulários em HTML permite coletar dados do usuário (como login, cadastro, pesquisa, etc.)</p>

    <form action="" method="">
        <fieldset>
            <legend>Contato</legend>
        </fieldset>

        <label for="nome">Nome:</label>
        <input id="nome" name="nome" type="text" required><br>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" required><br>

        <label for="senha">Senha</label>
        <input id="senha" name="senha" type="password" required><br>

        <button type="submit">Enviar</button>
    </form>

    <!-- Form = Inicio e fim do formulário -->
    <!-- Input = Campo de entrada (texto, número, email, semha, etc.) -->
    <!-- Textarea = Campo de texto longo -->
    <!-- Label = Texto descritivo de campo -->
    <!-- Select/option = Menu suspenso -->
    <!-- Fieldset/legend = Agrupamento lógico -->
    <!-- Button = Botão de ação -->
    
</body>
</html>
