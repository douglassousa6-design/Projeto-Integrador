<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hierarquia e Aninhamento</title>
</head>
<body>
    <h1>Hierarquia e Aninhamento</h1>
    <p>HTML deve ser bem estruturado, e as tags precisam ser aninhadas 
       corretamente:
    </p>
    <!-- CORRETO ✅ -->
     <p><strong>Texto importante</strong> dentro de um parágrafo</p>

     <!-- ERRADO ❌ -->
      <p><strong>Texto importante</p></strong>
    
</body>
</html>
