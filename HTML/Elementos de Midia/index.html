<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elementos de Midia</title>
</head>
<body>
    <h1>Elementos de Midia</h1>
    <p>Elementos de midia permitem incorporar imagens, audio e vídeos
       diretamente em páginas web.
    </p>

    <h2>Imagem</h2>
    <!-- Incorpora imagens -->

    <!-- Imagens por meio de link -->
    <img  src="https://i.insider.com/5ab3c79a7708e96b7203ad8f?width=1000&format=jpeg&auto=webp" alt="Foto do criador do HTML" width="300">
    <!-- Imagens por meio de arquivo -->
    <img src="../Elementos de Midia/imagem/imagem.png" alt="" width="300">


    <!-- src = caminho do arquivo -->
    <!-- alt = texto alternativo -->
    <!-- width / height = dimensões ou tamanho da imagem -->
    <h2>Links</h2>
    <a target="_blank" href="contato.html">Entre em contato</a>
    <!-- target="_black" = Abre em uma nova aba-->
    <!-- title="texto" = Dica flutuante-->
    <!-- href="#topo" = link para uma âncora na mesma -->

    <h2>Aúdio e Vídeo</h2>
    <audio controls>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <!---->

    <video controls>
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- controls: mostra os botões de play, pause e volume -->
    <!-- source: define o arquivo de áudio -->
    <!-- type: indica que é um aúdio ou vídeo -->



</body>
</html>
